<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gaylor Wiki</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    background: #1e293b;
    padding: 30px;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 40px;
}

.container {
    padding: 40px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    background: #273449;
}

a {
    color: #60a5fa;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>📚 Gaylor Wiki</h1>
    <p>一个简洁但高级的知识库</p>
</header>

<div class="container">

<div class="card">
    <h2>📖 学习笔记</h2>
    <p>记录所有学习内容</p>
</div>

<div class="card">
    <h2>💻 项目</h2>
    <p>我的代码和实验</p>
</div>

<div class="card">
    <h2>🧠 思考</h2>
    <p>一些想法和总结</p>
</div>

</div>

</body>
</html>
